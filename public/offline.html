<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0E7C7B" />
    <title>You're offline — Card Scanner</title>
    <style>
      :root { color-scheme: light dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        background: #F7F4EF;
        color: #0F2A33;
      }
      .card {
        max-width: 420px;
        text-align: center;
      }
      .mark {
        width: 72px; height: 72px;
        margin: 0 auto 20px;
        border-radius: 20px;
        background: #0E7C7B;
        display: flex; align-items: center; justify-content: center;
      }
      h1 { font-size: 28px; margin: 0 0 12px; }
      p { font-size: 18px; line-height: 1.6; color: #4b5b60; margin: 0 0 24px; }
      button {
        height: 56px; width: 100%;
        font-size: 20px; font-weight: 600;
        color: #fff; background: #0E7C7B;
        border: 0; border-radius: 12px;
      }
      @media (prefers-color-scheme: dark) {
        body { background: #0b1418; color: #eaf2f1; }
        p { color: #9fb3b1; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="mark" aria-hidden="true">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/>
          <path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
        </svg>
      </div>
      <h1>You're offline</h1>
      <p>Your saved contacts are available once you reconnect. Check your internet connection and try again.</p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
